name = "kingshot-csv"
main = "src/index.js"
compatibility_date = "2024-10-01"

# Public, non-secret config:
[vars]
GH_OWNER = "tedmax100"
GH_REPO = "kingshot_giftcode_bot"
GH_BRANCH = "main"
CSV_PATH = "kingshot_players.csv"

# Secrets — set via `npx wrangler secret put <NAME>`:
#   GITHUB_TOKEN     PAT (fine-grained or classic) with Contents:Read+Write on this repo
#   GOOGLE_CLIENT_ID OAuth Web client ID from Google Cloud Console
#   ALLOWED_EMAILS   comma-separated allowlist, e.g. "tedmax100@gmail.com"
#   ALLOWED_ORIGINS  comma-separated, e.g. "https://tedmax100.github.io"
